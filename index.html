<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="BalanceBridge — schedule, work hours, and wellbeing for working students." />
        <meta name="theme-color" content="#7f56d9" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet" />

        <title>BalanceBridge</title>
    </head>

    <body class="size-full bg-primary antialiased">
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
        <script>
            // Match ThemeProvider (`storageKey`: ui-theme) to reduce flash before React hydrates.
            (function () {
                var key = "ui-theme";
                var saved = localStorage.getItem(key);
                var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                var dark = saved === "dark" || (!saved && prefersDark);
                document.documentElement.classList.toggle("dark-mode", dark);
            })();
        </script>
    </body>
</html>
